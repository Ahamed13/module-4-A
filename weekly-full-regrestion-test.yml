trigger: none
pr: none
schedules:
  - cron: '0 2 * * 1-5'
    displayName: 'weekday-integration'
    branches: 
      include:
        - main
    always: false

  - cron: '0 4 * * 6'
    displayName: 'saturday-full-regression'
    branches: 
      include: 
        - main
    always: true

stages:
  - stage: Build
    displayName: 'Build'
    jobs:
      - job: BuildJob
        steps:
          - task: UseDotNet@2
            inputs:
              packageType: 'sdk'
              version: '8.x'

          - script: echo "dotnet restore ContosoApp.sln"
            displayName: 'Restore'

          - script: echo "dotnet build ContosoApp.sln --configuration $(buildConfiguration) --no-restore"
            displayName: 'Build'

  - stage: IntegrationTests
    displayName: 'Integration Tests'
    dependsOn: Build
    jobs:
      - job: IntegrationTestJob
        steps:
          - task: UseDotNet@2
            inputs:
              packageType: 'sdk'
              version: '8.x'

          - script: echo "dotnet test tests/ContosoApp.Integration.Tests/ContosoApp.Integration.Tests.csproj --configuration $(buildConfiguration) --logger trx"
            displayName: 'Run integration tests'    
  
  - stage: FullRegression
    displayName: 'Full Regression Suit (saturday only)'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.CronSchedule.DisplayName'], 'saturday-full-regression'))
    jobs: 
      - job: RegressionTestJob
        timeoutInMinutes: 180
        steps:
          - task: UseDotNet@2
            inputs:
              packageType: 'sdk'
              version: '8.x'

          - script: echo "dotnet test ContosoApp.sln --configuration $(buildConfiguration) --logger trx"
            displayName: 'Run full regression tests'

          - script: echo "dotnet test ContosoApp.sln --configuration $(buildConfiguration) --logger trx"
            displayName: 'Run performance tests'        