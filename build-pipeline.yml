trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: UseDotNet@2
    inputs:
      packageType: 'sdk'
      version: '8.x'

  - script: echo "dotnet publish src/ContosoApp.Api/ContosoApp.Api.csproj --configuration Release --output $(Build.ArtifactStagingDirectory)"
    displayName: 'Publish API'