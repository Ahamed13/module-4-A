trigger:
  branches:
    include:
      - main
      - experimental/testing

pool:
  vmImage: 'ubuntu-latest'

stages: 
  - stage: Build
    jobs: 
      - job: BuildJob
        steps:
          - task: UseDotNet@2
            inputs:
              packageType: 'sdk'
              version: '8.x'

          - script: echo "dotnet publish src/ContosoApp.Api/ContosoApp.Api.csproj"
            displayName: 'Publish API'  
              
  - stage: IntegrationTest
    dependsOn: Build
    jobs: 
      - job: IntTestJob
        steps:
          - task: UseDotNet@2
            inputs:
              packageType: 'sdk'
              version: '8.x'

          - script: echo "dotnet test tests/ContosoApp.Integration.Tests/ContosoApp.Integration.Tests.csproj --configuration Release"
            displayName: 'Integration tests'      