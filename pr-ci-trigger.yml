trigger:
  branches:
    include:
      - main
pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

steps:
  - task: UseDotNet@2
    inputs:
      packageType: 'sdk'
      version: '8.x'

  - script: |
      echo "Build Reason: $(Build.Reason)"
      echo "Source Branch: $(Build.SourceBranch)"
    displayName: 'Print trigger info'

  - script: echo "dotnet restore ContosoApp.sln"
    displayName: 'Restore'

  - script: echo "dotnet build ContosoApp.sln --configuration $(buildConfiguration) --no-restore"
    displayName: 'Build'

  - script: echo "dotnet test ContosoApp.sln --configuration $(buildConfiguration) --no-build"
    displayName: 'Test'