trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 'src/*'

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

steps:
  - task: UseDotNet@2
    inputs:
      packageType: 'sdk'
      version: '8.x'
    
  - script: echo "dotnet restore $(projectPath)"
    displayName: 'Restore API project'

  - script: echo "dotnet build $(projectPath) --configuration $(buildConfiguration) --no-restore"
    displayName: 'Build API project'

  - script: echo "dotnet test tests/ContosoApp.Api.Tests/ContosoApp.Api.Tests.csproj --configuration $(buildConfiguration) --no-build"
    displayName: 'Run API tests'

  - script: echo "dotnet publish $(projectPath) --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)"
    displayName: 'Publish API'